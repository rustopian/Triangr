name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ghidra_version: "11.3.2"
            ghidra_date: "20250415"
          - ghidra_version: "12.0.4"
            ghidra_date: "20260303"
    env:
      GHIDRA_VERSION: ${{ matrix.ghidra_version }}
      GHIDRA_DATE: ${{ matrix.ghidra_date }}
      GHIDRA_LIBS: >-
        Features/Base/lib/Base.jar
        Features/Decompiler/lib/Decompiler.jar
        Framework/Docking/lib/Docking.jar
        Framework/Generic/lib/Generic.jar
        Framework/Project/lib/Project.jar
        Framework/SoftwareModeling/lib/SoftwareModeling.jar
        Framework/Utility/lib/Utility.jar
        Framework/Gui/lib/Gui.jar

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Download Ghidra
      run: |
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Copy Ghidra libs
      run: |
        mkdir -p ./lib
        for libfile in ${{ env.GHIDRA_LIBS }}
          do echo "Copying ${libfile} to lib/"
          cp ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC/Ghidra/${libfile} ./lib/
        done

    - name: Build with Maven
      run: mvn clean package assembly:single

    - name: Assemble release directory
      run: |
        mkdir release
        # Match any pom version (1.0-SNAPSHOT, 1.5.1, ...); the assembly
        # plugin's finalName is GhidraMCP-${version}.zip.
        cp target/GhidraMCP-*.zip release/
        cp bridge_mcp_ghidra.py release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhidraMCP-artifact-${{ matrix.ghidra_version }}
        path: |
          release/*

  python-tests:
    # Tier-1 contract tests for the MCP Python bridge. Mocks the plugin's
    # HTTP server with pytest-httpx, so this job runs without Ghidra and
    # finishes in <10s. Independent of the Maven matrix above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install bridge runtime deps + test deps
        run: |
          python -m pip install --upgrade pip
          # Runtime deps the bridge needs to import successfully
          pip install 'httpx>=0.27,<1' 'tenacity>=8.2,<10' 'mcp>=1.2.0,<2'
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest tests/test_bridge.py -v
