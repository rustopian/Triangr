name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ghidra_version: "11.3.2"
            ghidra_date: "20250415"
          - ghidra_version: "12.0.4"
            ghidra_date: "20260303"
    env:
      GHIDRA_VERSION: ${{ matrix.ghidra_version }}
      GHIDRA_DATE: ${{ matrix.ghidra_date }}
      GHIDRA_LIBS: >-
        Features/Base/lib/Base.jar
        Features/Decompiler/lib/Decompiler.jar
        Framework/Docking/lib/Docking.jar
        Framework/Generic/lib/Generic.jar
        Framework/Project/lib/Project.jar
        Framework/SoftwareModeling/lib/SoftwareModeling.jar
        Framework/Utility/lib/Utility.jar
        Framework/Gui/lib/Gui.jar

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Download Ghidra
      run: |
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Copy Ghidra libs
      run: |
        mkdir -p ./lib
        for libfile in ${{ env.GHIDRA_LIBS }}
          do echo "Copying ${libfile} to lib/"
          cp ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC/Ghidra/${libfile} ./lib/
        done

    - name: Build with Maven
      run: mvn clean package assembly:single

    - name: Assemble release directory
      run: |
        mkdir release
        # Match any pom version (1.0-SNAPSHOT, 1.5.1, ...); the assembly
        # plugin's finalName is GhidraMCP-${version}.zip.
        cp target/GhidraMCP-*.zip release/
        cp bridge_mcp_ghidra.py release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhidraMCP-artifact-${{ matrix.ghidra_version }}
        path: |
          release/*

  python-tests:
    # Tier-1 contract tests for the MCP Python bridge. Mocks the plugin's
    # HTTP server with pytest-httpx, so this job runs without Ghidra and
    # finishes in <10s. Independent of the Maven matrix above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate installer script
        run: |
          bash -n scripts/install.sh
          scripts/install.sh --help >/dev/null
          scripts/install.sh --dry-run --no-install-deps --no-extension --no-angryghidra --prefix "$RUNNER_TEMP/triangr"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install bridge runtime deps + test deps
        run: |
          python -m pip install --upgrade pip
          # Runtime deps the bridge needs to import successfully
          pip install 'httpx>=0.27,<1' 'tenacity>=8.2,<10' 'mcp>=1.2.0,<2'
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest tests/test_bridge.py -v

  installer-smoke:
    # Exercises the real installer path, including Ghidra download, Python
    # runtime install, angr importability, extension install, and optional
    # AngryGhidra checkout/build when Gradle is available. Kept separate from
    # python-tests because it is intentionally heavier and benefits from cache.
    runs-on: ubuntu-latest
    env:
      TRIANGR_PREFIX: /tmp/triangr
      TRIANGR_CACHE: /home/runner/.cache/triangr-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: gradle/actions/setup-gradle@v4

      - name: Cache installer downloads and Gradle artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TRIANGR_CACHE }}
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: triangr-installer-${{ runner.os }}-ghidra-12.0.4-${{ hashFiles('requirements.txt', 'pom.xml', 'scripts/install.sh') }}
          restore-keys: |
            triangr-installer-${{ runner.os }}-ghidra-12.0.4-

      - name: Prime Python wheelhouse
        run: |
          mkdir -p "$TRIANGR_CACHE/wheels" "$TRIANGR_CACHE/pip"
          python -m pip install --upgrade pip
          python -m pip download --prefer-binary -r requirements.txt -d "$TRIANGR_CACHE/wheels"

      - name: Run full installer
        run: |
          mkdir -p "$TRIANGR_CACHE"
          if [ -d "$TRIANGR_CACHE/tools" ]; then
            mkdir -p "$TRIANGR_PREFIX"
            cp -a "$TRIANGR_CACHE/tools" "$TRIANGR_PREFIX/tools"
          fi

          PIP_CACHE_DIR="$TRIANGR_CACHE/pip" \
          PIP_FIND_LINKS="$TRIANGR_CACHE/wheels" \
          PIP_PREFER_BINARY=1 \
            scripts/install.sh --prefix "$TRIANGR_PREFIX" --install-deps --yes

          rm -rf "$TRIANGR_CACHE/tools"
          mkdir -p "$TRIANGR_CACHE"
          cp -a "$TRIANGR_PREFIX/tools" "$TRIANGR_CACHE/tools"

      - name: Verify installer outputs
        run: |
          source "$TRIANGR_PREFIX/env.sh"
          test -x "$GHIDRA_HOME/ghidraRun"
          test -d "$GHIDRA_HOME/Ghidra/Extensions/GhidraMCP"
          test -x "$TRIANGR_PREFIX/bin/triangr-mcp"
          "$GHIDRA_MCP_ANGR_PYTHON" -c "import angr; print(angr.__version__)"
          "$GHIDRA_MCP_ANGR_PYTHON" -m bridge_mcp_ghidra --help >/dev/null
          "$TRIANGR_PREFIX/bin/triangr-mcp" --help >/dev/null
          test -f "$ANGRYGHIDRA_SCRIPT"
